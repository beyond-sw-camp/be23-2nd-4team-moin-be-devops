apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: moin-backend-hpa
  namespace: moin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: moin-deployment 
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50