apiVersion: apps/v1
kind: Deployment
metadata:
  name: moin-deployment
  namespace: moin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-moin
  template:
    metadata:
      labels:
        app: my-moin
    spec:
      containers:
      - name: my-moin
        image: 346903264902.dkr.ecr.ap-northeast-2.amazonaws.com/moin/moiin:latest # erc로 변경 
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1"
            memory: "500Mi"
          requests:
            cpu: "0.5"
            memory: "250Mi"
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: DB_HOST
        - name: DB_PW
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: DB_PW
        - name: GOOGLE_HOST
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: GOOGLE_HOST
        - name: GOOGLE_PW
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: GOOGLE_PW
        - name: GOOGLE_ID
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: GOOGLE_ID
        - name: GOOGLE_SECRET
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: GOOGLE_SECRET
        - name: GOOGLE_REDIRECT
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: GOOGLE_REDIRECT
        - name: KAKAO_ID
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: KAKAO_ID
        - name: KAKAO_SECRET
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: KAKAO_SECRET
        - name: KAKAO_REDIRECT
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: KAKAO_REDIRECT
        - name: PORTONE_ID
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: PORTONE_ID
        - name: PORTONE_CHANNEL
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: PORTONE_CHANNEL
        - name: PORTONE_SECRET
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: PORTONE_SECRET
        - name: TMAP_KEY
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: TMAP_KEY
        - name: SECRETKEY_AT
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: SECRETKEY_AT
        - name: SECRETKEY_RT
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: SECRETKEY_RT
        - name: AWS_KEY
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: AWS_KEY
        - name: AWS_SECRET
          valueFrom:
            secretKeyRef:
              name: moin-secrets
              key: AWS_SECRET      
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
  namespace: moin
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: my-moin