apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: my-issuer
  namespace: moin
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: tpalsdl87@gmail.com
    privateKeySecretRef:
      name: my-issuer
    solvers:
    - http01:
        ingress:
          class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: server-moiin-shop-tls
  namespace: moin
spec:
  secretName: server-moiin-shop-tls
  duration: 2160h 
  renewBefore: 360h 
  issuerRef:
    name: my-issuer
    kind: ClusterIssuer
  commonName: server.moiin.shop
 
