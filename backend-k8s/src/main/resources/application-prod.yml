server:
  port: 8080
spring:
  config:
    activate:
      on-profile: prod
  data:
    web:
      page-serialization-mode: via_dto

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 5000
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/moin?useSSL=true
    username: admin
    password: ${DB_PW}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto : create
    show-sql: true
    properties:
      hibernate:
        default_batch_fetch_size: 100 
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10000MB
      max-request-size: 10000MB
  redis:
    host: redis-service
    port: 6379
  mail:
    host: ${GOOGLE_HOST}
    port: 587  
    username: tpalsdl87@gmail.com
    password: ${GOOGLE_PW}  
    properties:
      mail:
        smtp:
          auth: true  
          starttls:
            enable: true  
          timeout: 5000  
jwt:
  expiration: 30
  secretKey: ${SECRETKEY_AT}
  expirationRt: 3000
  secretKeyRt: ${SECRETKEY_RT} 
aws:
  credentials:
    access-key: ${AWS_KEY}   
    secret-key: ${AWS_SECRET} 
  region: ap-northeast-2
  s3:
    bucket1: moin-user-profile-image 
    bucket2: moin-feed-profile-image 
    bucket3: moin-chat-project1 
    bucket4: moin-crew-profile-image
    bucket5: moin-meeting-profile-image
oauth:
  google:
    client-id: ${GOOGLE_ID}
    client-secret: ${GOOGLE_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT}
  kakao:
    client-id: ${KAKAO_ID}
    client-secret: ${KAKAO_SECRET}
    redirect-uri: ${KAKAO_REDIRECT}
portone:
  store-id: ${PORTONE_ID} 
  channel-key: ${PORTONE_CHANNEL} 
  api-secret: ${PORTONE_SECRET}
tmap:
  appKey: ${TMAP_KEY}